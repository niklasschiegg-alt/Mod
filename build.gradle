plugins {
	id 'net.fabricmc.fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	// Fabric-Repos werden von Loom automatisch hinzugefügt
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	// Ab 26.1 nutzt Minecraft direkt Mojangs offizielle (unobfuskierte) Namen,
	// daher wird keine separate Mappings-Abhängigkeit (Yarn) mehr benötigt.
	loader "net.fabricmc:fabric-loader:${project.loader_version}"
	api "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
	withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
	it.options.encoding = "UTF-8"
	it.options.release = 25
}

processResources {
	inputs.property "version", project.version
	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}
