name: Build Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Grant execute permission for gradlew
        run: |
          if [ -f "./gradlew" ]; then chmod +x ./gradlew; fi

      - name: Build with Gradle
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew build --no-daemon
          else
            curl -s https://services.gradle.org/distributions/gradle-9.4.0-bin.zip -o gradle.zip
            unzip -q gradle.zip
            ./gradle-9.4.0/bin/gradle build --no-daemon
          fi

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: freemouse-jar
          path: build/libs/*.jar
